name: Vanguard Nexus CI/CD 🚀

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: 🛡️ Checkout Code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m nltk.downloader vader_lexicon

    - name: 🧪 Execute Stress Test
      env:
        # Injects your secret into the test environment
        ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      run: |
        python services/StressTester.py

    - name: 🐳 Build Docker Image
      run: |
        docker build -t vanguard-nexus:latest .

    - name: ✅ System Verified
      run: echo "Vanguard Nexus passed all architectural and logic checks."
