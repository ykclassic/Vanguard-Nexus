name: Vanguard Nexus Discord Bot

on:
  workflow_dispatch: # Allows manual start
  push:
    branches: [ main ] # Starts on every push
  schedule:
    - cron: '0 */6 * * *' # Restarts every 6 hours to ensure it stays alive

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-python: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py requests pandas

      - name: Run Discord Listener
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python services/DiscordListener.py
